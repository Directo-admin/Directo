<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directo · Newsletter Archive</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', sans-serif;
      background: #faf9f7;
      color: #111;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 64px 20px 48px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .header img {
      height: 72px;
      width: auto;
      display: block;
      margin: 0 auto;
    }

    .bar {
      width: 32px;
      height: 1px;
      background: #c9a96e;
      margin: 20px auto;
    }

    .subtitle {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
    }

    .archive {
      max-width: 860px;
      margin: 60px auto;
      padding: 0 32px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(0,0,0,0.09);
      padding: 36px 28px 30px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: #c9a96e;
      box-shadow: 0 2px 20px rgba(201,169,110,0.08);
    }

    .card-tag {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 16px;
    }

    .card-month {
      font-size: 40px;
      font-weight: 300;
      line-height: 1;
      margin-bottom: 4px;
    }

    .card-year {
      font-size: 12px;
      font-weight: 400;
      color: rgba(0,0,0,0.38);
      letter-spacing: 0.08em;
      margin-bottom: 22px;
    }

    .card-desc {
      font-size: 12px;
      font-weight: 400;
      color: rgba(0,0,0,0.52);
      line-height: 1.75;
      margin-bottom: 26px;
    }

    .card-cta {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #111;
      border-bottom: 1px solid #c9a96e;
      padding-bottom: 2px;
      display: inline-block;
    }

    .footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid rgba(0,0,0,0.06);
      font-size: 10px;
      font-weight: 400;
      color: rgba(0,0,0,0.3);
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>

<div class="header">
  <img src="https://musercompany.cafe24.com/Directo%20image/Directo_logo_black_2.png" alt="Directo">
  <div class="bar"></div>
  <div class="subtitle">Directo Newsletter Archive</div>
</div>

<div class="archive">
  <div class="section-label">Published Newsletters</div>

  <div class="grid">

    <!-- ★ Add new month: copy the card block below, paste above, update month/year/link/desc -->

    <a class="card" href="./2026-05/">
      <div class="card-tag">Newsletter</div>
      <div class="card-month">May</div>
      <div class="card-year">2026</div>
      <div class="card-desc">New brand arrivals and<br>Directo updates this month</div>
      <span class="card-cta">View Newsletter</span>
    </a>

  </div>
</div>

<div class="footer">© 2026 Directo · Korea's Premium Niche Marketplace</div>

</body>
</html>
