<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directo · Newsletter Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #faf9f7;
      color: #111;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 64px 20px 48px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .bar {
      width: 32px;
      height: 1px;
      background: #c9a96e;
      margin: 16px auto;
    }

    .subtitle {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
    }

    .archive {
      max-width: 860px;
      margin: 60px auto;
      padding: 0 32px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(0,0,0,0.09);
      padding: 36px 28px 30px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: #c9a96e;
      box-shadow: 0 2px 20px rgba(201,169,110,0.08);
    }

    .card-tag {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 16px;
    }

    .card-month {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 4px;
    }

    .card-year {
      font-size: 12px;
      color: rgba(0,0,0,0.38);
      letter-spacing: 0.08em;
      margin-bottom: 22px;
    }

    .card-desc {
      font-size: 11.5px;
      color: rgba(0,0,0,0.52);
      line-height: 1.75;
      margin-bottom: 26px;
    }

    .card-cta {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #111;
      border-bottom: 1px solid #c9a96e;
      padding-bottom: 2px;
      display: inline-block;
    }

    .footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid rgba(0,0,0,0.06);
      font-size: 10px;
      color: rgba(0,0,0,0.3);
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Directo</div>
  <div class="bar"></div>
  <div class="subtitle">Brand Newsletter Archive</div>
</div>

<div class="archive">
  <div class="section-label">발행된 뉴스레터</div>

  <div class="grid">

    <!-- ★ 다음달 추가 시: 아래 카드 블록 하나를 복사해서 위에 붙여넣고 내용만 수정 -->

    <a class="card" href="./2026-05/">
      <div class="card-tag">Newsletter</div>
      <div class="card-month">May</div>
      <div class="card-year">2026</div>
      <div class="card-desc">이달의 신규 입점 브랜드 및<br>디렉토 주요 소식</div>
      <span class="card-cta">View Newsletter</span>
    </a>

  </div>
</div>

<div class="footer">© 2026 Directo · Korea's Premium Niche Marketplace</div>

</body>
</html>
